name: Build and publish Docker image

# Builds the txn-tester image and publishes it to this repo's GitHub Container
# Registry (ghcr.io/<owner>/<repo>).
#
# Build versions of the three bundled tools are controlled HERE: edit the
# committish (and Lombok) values in the `env:` block below; they are passed to
# the Dockerfile as --build-args. No need to touch the Dockerfile to bump a tool.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# ---------------------------------------------------------------------------
# Pinned build versions — EDIT THESE to control what gets built.
# ---------------------------------------------------------------------------
env:
  TROC_REPO: https://github.com/tcse-iscas/Troc
  TROC_SHA: a6d50e3f596b356137d2f8c3c8b31a61bf7fe2c5
  FUCCI_REPO: https://github.com/Reverie4u/Fucci
  FUCCI_SHA: 1ab278ee890a3f0fd5ac179346002a107365755d
  APTRANS_REPO: https://github.com/Paper-code-sigmod/APTrans
  APTRANS_SHA: e9786513c2d78b3ed6a7d3925eeda4346633814c
  LOMBOK_VERSION: 1.18.42

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Publish on pushes to main and on tags; build-only on pull requests.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and load into the local docker daemon so the smoke test can run it.
      # This happens on every event (including PRs); nothing is published yet.
      - name: Build image (load for testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: txn-tester:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TROC_REPO=${{ env.TROC_REPO }}
            TROC_SHA=${{ env.TROC_SHA }}
            FUCCI_REPO=${{ env.FUCCI_REPO }}
            FUCCI_SHA=${{ env.FUCCI_SHA }}
            APTRANS_REPO=${{ env.APTRANS_REPO }}
            APTRANS_SHA=${{ env.APTRANS_SHA }}
            LOMBOK_VERSION=${{ env.LOMBOK_VERSION }}

      # Smoke test the freshly built image on every event (PRs included).
      - name: Smoke test
        id: smoke
        run: ./test/smoke-test.sh
        env:
          TXN_TESTER_IMAGE: txn-tester:ci

      # Publish only on pushes to main / tags — never on pull requests. Reuses
      # the gha cache from the build above, so this is effectively just a push.
      - name: Build and push
        if: github.event_name != 'pull_request' && steps.smoke.outcome == 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TROC_REPO=${{ env.TROC_REPO }}
            TROC_SHA=${{ env.TROC_SHA }}
            FUCCI_REPO=${{ env.FUCCI_REPO }}
            FUCCI_SHA=${{ env.FUCCI_SHA }}
            APTRANS_REPO=${{ env.APTRANS_REPO }}
            APTRANS_SHA=${{ env.APTRANS_SHA }}
            LOMBOK_VERSION=${{ env.LOMBOK_VERSION }}
